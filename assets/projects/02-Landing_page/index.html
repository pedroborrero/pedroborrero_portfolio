        const App = () => {
            const [theme, setTheme] = useState(() => {
                const stored = localStorage.getItem('theme');
                if (stored) return stored;
                return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            });

            // Filtering State
            const [searchQuery, setSearchQuery] = useState("");
            const [selectedFilters, setSelectedFilters] = useState([]);
            
            // Roadmap Navigation
            const [activeRoadmapStep, setActiveRoadmapStep] = useState(0);

            // Grok AI Chat Integration
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('grok_api_key') || "");
            const [showApiKeyInput, setShowApiKeyInput] = useState(false);
            const [chatMessages, setChatMessages] = useState([
                { id: 1, role: 'assistant', text: "¡Hola! Soy tu asistente de orientación. Puedes preguntarme qué tecnologías se adaptan mejor a tus objetivos o cómo conectar la API real de Grok." }
            ]);
            const [chatInput, setChatInput] = useState("");
            const [chatLoading, setChatLoading] = useState(false);
            const chatEndRef = useRef(null);

            // Newsletter
            const [emailInput, setEmailInput] = useState("");
            const [newsletterStatus, setNewsletterStatus] = useState("idle"); // idle, loading, success

            // FAQ accordion
            const [faqOpen, setFaqOpen] = useState(null);

            // Responsive Nav Menu
            const [mobileMenu, setMobileMenu] = useState(false);

            useEffect(() => {
                const root = document.documentElement;
                if (theme === 'dark') {
                    root.classList.add('dark');
                    root.classList.remove('light');
                } else {
                    root.classList.add('light');
                    root.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            // Auto-scroll inside chat
            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, chatLoading]);

            // Auto-reinitialize Lucide icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [chatMessages, showApiKeyInput, mobileMenu, theme]);

            const toggleTheme = () => {
                setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            };

            const toggleFilter = (filter) => {
                setSelectedFilters(prev => 
                    prev.includes(filter) 
                        ? prev.filter(f => f !== filter) 
                        : [...prev, filter]
                );
            };

            const filteredCourses = COURSES.filter(course => {
                const query = searchQuery.toLowerCase().trim();
                const matchesSearch = !query || 
                    course.title.toLowerCase().includes(query) ||
                    course.platform.toLowerCase().includes(query) ||
                    course.tech.some(t => t.toLowerCase().includes(query)) ||
                    course.category.toLowerCase().includes(query);

                if (!matchesSearch) return false;
                if (selectedFilters.length === 0) return true;

                // Return true if course matches ALL active filters
                return selectedFilters.every(filter => {
                    if (filter === "Certificado Gratis") return course.cert;
                    if (["Principiante", "Intermedio", "Avanzado"].includes(filter)) return course.difficulty === filter;
                    if (course.category === filter) return true;
                    if (course.tech.includes(filter)) return true;
                    return false;
                });
            });

            const handleNewsletterSubmit = (e) => {
                e.preventDefault();
                if (!emailInput || !emailInput.includes("@")) {
                    alert("Por favor, introduce un correo electrónico válido.");
                    return;
                }
                setNewsletterStatus("loading");
                setTimeout(() => {
                    // Simulated persistence inside localStorage
                    const emails = JSON.parse(localStorage.getItem('openpath_newsletter') || "[]");
                    emails.push(emailInput);
                    localStorage.setItem('openpath_newsletter', JSON.stringify(emails));
                    setNewsletterStatus("success");
                    setEmailInput("");
                    setTimeout(() => setNewsletterStatus("idle"), 5000);
                }, 1000);
            };

            const handleSaveApiKey = (e) => {
                e.preventDefault();
                localStorage.setItem('grok_api_key', apiKey.trim());
                setShowApiKeyInput(false);
                setChatMessages(prev => [
                    ...prev,
                    { id: Date.now(), role: 'system', text: `🔐 API Key de Grok configurada con éxito. ¡Listo para interactuar!` }
                ]);
            };

            const handleRemoveApiKey = () => {
                localStorage.removeItem('grok_api_key');
                setApiKey("");
                setChatMessages(prev => [
                    ...prev,
                    { id: Date.now(), role: 'system', text: "🗑️ API Key eliminada. El asistente volverá al modo simulación." }
                ]);
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;

                const userText = chatInput;
                const userMsgId = Date.now();
                setChatMessages(prev => [...prev, { id: userMsgId, role: 'user', text: userText }]);
                setChatInput("");
                setChatLoading(true);

                if (apiKey.trim()) {
                    // CONEXIÓN DIRECTA Y REAL CON LA API DE GROK (xAI)
                    try {
                        // Construimos el historial de conversación en formato oficial
                        const previousFormatted = chatMessages
                            .filter(m => m.role !== 'system')
                            .map(m => ({
                                role: m.role === 'assistant' ? 'assistant' : 'user',
                                content: m.text
                            }));

                        const response = await fetch("https://api.x.ai/v1/chat/completions", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization": `Bearer ${apiKey.trim()}`
                            },
                            body: JSON.stringify({
                                model: "grok-beta", // O usa "grok-2-1212" según disponibilidad de cuenta
                                messages: [
                                    { 
                                        role: "system", 
                                        content: "Eres un mentor senior de desarrollo de software para la plataforma OpenPath. Ayuda de manera concisa a elegir el mejor curso basándote en la base de datos de cursos (freeCodeCamp, Harvard CS50, Full Stack Helsinki, etc.). Responde con un tono motivador, tecnológico y profesional, en español." 
                                    },
                                    ...previousFormatted,
                                    { role: "user", content: userText }
                                ],
                                temperature: 0.7
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`Error de red: ${response.status} ${response.statusText}`);
                        }

                        const data = await response.json();
                        const answer = data.choices[0].message.content;
                        setChatMessages(prev => [...prev, { id: Date.now(), role: 'assistant', text: answer }]);

                    } catch (err) {
                        setChatMessages(prev => [
                            ...prev,
                            { 
                                id: Date.now(), 
                                role: 'system', 
                                text: `🚨 Error al conectar con Grok: ${err.message}. Verifica que tu API Key sea válida e incluya saldo en la consola xAI console.` 
                            }
                        ]);
                    } finally {
                        setChatLoading(false);
                    }
                } else {
                    // SIMULACIÓN DE RESPUESTA INTELIGENTE SIN RECARGAR EL SERVIDOR (RESPUESTA DE CLIENTE SECCIÓN RESPONSES)
                    setTimeout(() => {
                        let dynamicReply = "Interesante pregunta. Para guiarte de forma óptima, te recomiendo revisar el curso CS50x de Harvard si buscas fundamentos algorítmicos potentes, o Full Stack Open de Helsinki si deseas saltar a React y Node.js de inmediato.";
                        
                        const normalizedText = userText.toLowerCase();
                        if (normalizedText.includes("python")) {
                            dynamicReply = "¡Veo que te interesa Python! El mejor punto de partida mundial es 'CS50P: Programming with Python' de Harvard o 'Skills For All' de Cisco, ambos incluidos y filtrables en la sección de arriba.";
                        } else if (normalizedText.includes("react") || normalizedText.includes("frontend")) {
                            dynamicReply = "Para desarrollo Frontend con React, el camino ideal es completar la certificación Responsive Web Design de freeCodeCamp y después dar el salto a 'Full Stack Open' de la Universidad de Helsinki.";
                        } else if (normalizedText.includes("cero") || normalizedText.includes("empezar") || normalizedText.includes("principiante")) {
                            dynamicReply = "Si empiezas desde cero, te sugiero activar los filtros 'Principiante' y 'Certificado Gratis' arriba. 'Responsive Web Design' de freeCodeCamp te dará bases perfectas sin frustraciones iniciales.";
                        } else if (normalizedText.includes("backend") || normalizedText.includes("servidor")) {
                            dynamicReply = "Para dominar Backend puedes optar por 'MOOC.fi Java Programming' para aprender estructuración sólida orientada a objetos, o bien el bloque de servidores en 'Full Stack Open' con Node y Express.";
                        } else if (normalizedText.includes("grok") || normalizedText.includes("api")) {
                            dynamicReply = "¡Exacto! Esta interfaz está totalmente conectada para interactuar con Grok. Haz clic en 'Configurar Grok API' en el banner superior de este chat para usar tus credenciales de xAI y probarlo de forma 100% real.";
                        }

                        setChatMessages(prev => [...prev, { id: Date.now(), role: 'assistant', text: dynamicReply }]);
                        setChatLoading(false);
                    }, 1200);
                }

                    {}

                                <a href="#ia-chat" className="text-sm font-medium dark:text-gray-300 dark:hover:text-white text-gray-600 hover:text-slate-950 transition-colors flex items-center gap-1.5">
                                    Orientador IA

                                            <h4 className="font-bold text-sm dark:text-white text-slate-950">OpenPath Mentor</h4>
                                            <p className="text-[10px] text-emerald-500 font-bold flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> 
                                                {apiKey ? "API Real Grok Conectada" : "Modo Simulación Activo"}
                                            </p>
                                        </div>
                                    </div>

                                    {/* Action controller keys */}
                                    <div className="flex items-center gap-2">
                                        {apiKey ? (
                                            <button 
                                                onClick={handleRemoveApiKey}
                                                className="px-3 py-1.5 rounded-lg text-xs font-semibold bg-red-500/10 text-red-500 hover:bg-red-500/20 transition-colors"
                                            >
                                                Desconectar API Key
                                            </button>
                                        ) : (
                                            <button 
                                                onClick={() => setShowApiKeyInput(!showApiKeyInput)}
                                                className="px-3.5 py-1.5 rounded-lg text-xs font-bold bg-brand-cyan/10 text-brand-cyan hover:bg-brand-cyan/20 transition-colors flex items-center gap-1"
                                            >
                                                <i data-lucide="key" className="w-3.5 h-3.5"></i> Configurar Grok API
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* API Key Setup Panel */}
                                {showApiKeyInput && (
                                    <form onSubmit={handleSaveApiKey} className="p-4 dark:bg-slate-900 bg-slate-100 border-b dark:border-white/5 border-slate-200 animate-slide-down flex flex-col gap-3">
                                        <p className="text-xs dark:text-gray-300 text-gray-600">
                                            Tu clave de API se almacena de forma segura **solo en tu navegador (localStorage)** y se envía directamente a la API oficial de xAI (`https://api.x.ai/v1`).
                                        </p>
                                        <div className="flex gap-2">
                                            <input 
                                                type="password"
                                                value={apiKey}
                                                onChange={(e) => setApiKey(e.target.value)}
                                                placeholder="Inserta tu xAI (Grok) API Key (sk-...)"
                                                required
                                                className="flex-1 px-3 py-2 rounded-lg dark:bg-black/50 bg-white border dark:border-white/10 border-slate-300 text-xs focus:outline-none"
                                            />
                                            <button type="submit" className="px-4 py-2 bg-brand-cyan text-white text-xs font-bold rounded-lg hover:opacity-90">
                                                Guardar
                                            </button>
                                        </div>
                                    </form>
                                )}

                                {/* Message Window Panel */}
                                <div className="p-6 h-[350px] overflow-y-auto flex flex-col gap-4">
                                    {chatMessages.map(msg => {
                                        if (msg.role === 'system') {
                                            return (
                                                <div key={msg.id} className="text-center">
                                                    <span className="inline-block px-3 py-1 rounded bg-slate-500/10 text-slate-500 text-[10px] font-mono leading-relaxed max-w-lg">
                                                        {msg.text}
                                                    </span>
                                                </div>
                                            );
                                        }

                                        const isAssistant = msg.role === 'assistant';
                                        return (
                                            <div 
                                                key={msg.id} 
                                                className={`flex gap-3 max-w-[85%] ${isAssistant ? '' : 'self-end flex-row-reverse'}`}
                                            >
                                                <div className={`w-8 h-8 rounded-full shrink-0 flex items-center justify-center text-xs ${
                                                    isAssistant ? 'bg-brand-cyan text-white' : 'bg-brand-blue text-white'
                                                }`}>
                                                    {isAssistant ? "AI" : "Tú"}
                                                </div>
                                                <div className={`p-4 rounded-2xl text-xs md:text-sm leading-relaxed ${
                                                    isAssistant 
                                                        ? 'dark:bg-slate-900/50 bg-slate-100 dark:text-gray-200 text-slate-900 rounded-tl-sm' 
                                                        : 'bg-brand-blue text-white rounded-tr-sm'
                                                }`}>
                                                    {msg.text}
                                                </div>
                                            </div>
                                        );
                                    })}

                                    {chatLoading && (
                                        <div className="flex gap-3 max-w-[85%]">
                                            <div className="w-8 h-8 rounded-full bg-brand-cyan text-white flex items-center justify-center text-xs">AI</div>
                                            <div className="p-4 rounded-2xl dark:bg-slate-900/50 bg-slate-100 flex items-center gap-1 rounded-tl-sm">
                                                <span className="w-1.5 h-1.5 bg-brand-cyan rounded-full animate-bounce"></span>
                                                <span className="w-1.5 h-1.5 bg-brand-cyan rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                                <span className="w-1.5 h-1.5 bg-brand-cyan rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                            </div>
                                        </div>
                                    )}

                                    <div ref={chatEndRef}></div>
                                </div>

                                {/* Input Panel */}
                                <form onSubmit={handleSendMessage} className="p-4 dark:bg-slate-950/60 bg-slate-50 border-t dark:border-white/5 border-slate-200 flex gap-2">
                                    <input 
                                        type="text"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        placeholder={apiKey ? "Escribe a Grok..." : "Pregúntame sobre 'Python desde cero', 'React', o conecta tu Grok API Key..."}
                                        className="flex-1 px-4 py-3 rounded-xl dark:bg-black/50 bg-white border dark:border-white/10 border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-blue dark:text-white text-slate-950 text-xs md:text-sm transition-all"
                                    />
                                    <button 
                                        type="submit"
                                        className="p-3 bg-brand-cyan text-white rounded-xl hover:opacity-90 shadow-md transition-all shrink-0"
                                    >
                                        <i data-lucide="send" className="w-4 h-4 md:w-5 h-5"></i>
                                    </button>
                                </form>

                            </div>

                            {/* API integration guidelines */}
                            <div className="mt-6 text-center">
                                <p className="text-xs dark:text-gray-500 text-gray-500">
                                    ¿No tienes API Key? Entra en <a href="https://console.x.ai" target="_blank" rel="noopener noreferrer" className="text-brand-cyan underline">console.x.ai</a>, genera tus credenciales de Grok, recarga saldo y pruébalo de forma real de inmediato.
                                </p>
                            </div>

                        </div>
                    </section>

                    {}
                    <section id="faq" className="py-20 z-10 relative scroll-mt-20 dark:bg-slate-950/20 bg-slate-100/30 border-y dark:border-white/5 border-slate-200">
                        <div className="max-w-4xl mx-auto px-6">
                            
                            <div className="text-center mb-16">
                                <h2 className="text-3xl font-extrabold tracking-tight dark:text-white text-slate-950 mb-4">Preguntas Frecuentes</h2>
                                <p className="dark:text-gray-400 text-gray-600 max-w-xl mx-auto">
                                    Resolviendo tus dudas básicas sobre las plataformas asociadas, certificados y veracidad de contenidos.
                                </p>
                            </div>

                            <div className="space-y-4">
                                {[
                                    { q: "¿Los certificados son realmente gratis?", a: "Sí. Las plataformas sugeridas como freeCodeCamp, Full Stack Open y MOOC.fi de la Universidad de Helsinki proveen certificados oficiales digitales completamente gratuitos. CS50x de Harvard permite obtener un certificado digital verificado de su propio curso si obtienes un 70%+ en sus evaluaciones sin coste adicional." },
                                    { q: "¿Necesito experiencia previa?", a: "No. Cursos como Responsive Web Design o CS50P de Harvard están ideados desde cero para absolutos novatos que tocan una línea de código por primera vez." },
                                    { q: "¿Qué curso debería empezar primero?", a: "Para desarrollo frontend, inicia con la certificación de Responsive Web Design de freeCodeCamp. Para lógica algorítmica y fundamentos amplios, el inigualable CS50x de Harvard es tu mejor camino." },
                                    { q: "¿Los cursos sirven para trabajar?", a: "Absolutamente. De hecho, programas avanzados como Full Stack Open de Helsinki equivalen a un intensivo bootcamp industrial de varios meses muy respetado en el ecosistema técnico." },
                                    { q: "¿Puedo aprender desde cero?", a: "Sí. Todo el contenido está estructurado de manera autodidacta y secuencial para progresar paso a paso sin vacíos educativos complejos." }
                                ].map((faq, idx) => {
                                    const isOpen = faqOpen === idx;
                                    return (
                                        <div key={idx} className="dark:bg-[#0a0a0c]/80 bg-white border dark:border-white/5 border-slate-200 rounded-2xl overflow-hidden shadow-sm transition-all duration-300">
                                            <button 
                                                onClick={() => setFaqOpen(isOpen ? null : idx)}
                                                className="w-full px-6 py-5 flex items-center justify-between font-bold text-left dark:text-white text-slate-950 text-sm md:text-base"
                                            >
                                                <span>{faq.q}</span>
                                                <i data-lucide={isOpen ? 'minus' : 'plus'} className={`w-4 h-4 text-brand-cyan transition-transform`}></i>
                                            </button>
                                            <div className={`transition-all duration-300 ease-in-out ${isOpen ? 'max-h-60 opacity-100 border-t dark:border-white/5 border-slate-200 p-6' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                                                <p className="dark:text-gray-400 text-gray-600 text-xs md:text-sm leading-relaxed">
                                                    {faq.a}
                                                </p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                        </div>
                    </section>

                    {}
                    <section className="py-20 z-10 relative">
                        <div className="max-w-4xl mx-auto px-6">
                            
                            <div className="dark:bg-[#0a0a0c]/80 bg-white border dark:border-white/5 border-slate-200 rounded-3xl p-8 md:p-12 shadow-2xl relative overflow-hidden backdrop-blur-md">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-bl from-brand-violet/5 to-transparent blur-2xl"></div>
                                
                                <div className="max-w-2xl mx-auto text-center flex flex-col gap-6">
                                    <h2 className="text-3xl font-extrabold tracking-tight dark:text-white text-slate-950">
                                        Suscríbete para recibir nuevas alertas
                                    </h2>
                                    <p className="dark:text-gray-400 text-gray-600 text-sm md:text-base leading-relaxed">
                                        Recibe semanalmente curación de nuevos programas libres de coste agregados, guías técnicas útiles y roadmaps de inserción laboral rápidos. No spam, solo valor real.
                                    </p>

                                    {newsletterStatus === "success" ? (
                                        <div className="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 font-semibold text-sm animate-fade-in flex items-center justify-center gap-2">
                                            <i data-lucide="check-circle" className="w-5 h-5"></i> ¡Te has suscrito con éxito! Guarda tu bandeja de entrada.
                                        </div>
                                    ) : (
                                        <form onSubmit={handleNewsletterSubmit} className="flex flex-col sm:flex-row gap-3">
                                            <input 
                                                type="email"
                                                value={emailInput}
                                                onChange={(e) => setEmailInput(e.target.value)}
                                                placeholder="Introduce tu dirección de email..."
                                                required
                                                className="flex-1 px-4 py-3.5 rounded-xl dark:bg-black/50 bg-slate-50 border dark:border-white/10 border-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-blue text-sm dark:text-white text-slate-950 transition-all"
                                            />
                                            <button 
                                                type="submit"
                                                disabled={newsletterStatus === "loading"}
                                                className="px-6 py-3.5 bg-brand-cyan hover:opacity-90 active:scale-[0.98] text-white font-bold rounded-xl text-sm shadow-md shadow-brand-cyan/20 shrink-0 transition-all flex items-center justify-center gap-2"
                                            >
                                                {newsletterStatus === "loading" ? (
                                                    <span className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                                                ) : "Suscribirse"}
                                            </button>
                                        </form>
                                    )}

                                    <p className="text-[10px] dark:text-gray-500 text-gray-400">
                                        Al suscribirte, aceptas que guardemos tu correo de forma local para enviarte novedades de OpenPath.
                                    </p>
                                </div>
                            </div>

                        </div>
                    </section>

                    {}
                    <section className="py-24 text-center relative z-10 overflow-hidden border-t dark:border-white/5 border-slate-200">
                        <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-2xl h-1/2 bg-brand-cyan/10 blur-[100px] rounded-full pointer-events-none"></div>
                        <div className="max-w-2xl mx-auto px-6 flex flex-col gap-6">
                            <h2 className="text-3xl md:text-5xl font-extrabold tracking-tight dark:text-white text-slate-950">
                                Comienza hoy tu carrera sin deudas
                            </h2>
                            <p className="dark:text-gray-400 text-gray-600 text-base">
                                No esperes más. El conocimiento de nivel mundial está al alcance de un par de clics. Elige tu rumbo y empieza a construir.
                            </p>
                            <div className="flex justify-center pt-2">
                                <a href="#cursos" className="px-8 py-4 rounded-xl font-bold bg-gradient-to-r from-brand-blue to-brand-cyan text-white text-base shadow-lg hover:opacity-90 active:scale-[0.98]">
                                    Explorar Cursos Gratuitos
                                </a>
                            </div>
                        </div>
                    </section>

                    {}
                    <footer className="border-t dark:border-white/5 border-slate-200 dark:bg-[#030303]/80 bg-slate-50/50 py-12 relative z-10">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
                            
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-gradient-to-tr from-brand-blue to-brand-violet flex items-center justify-center font-bold text-white text-sm">
                                    OP
                                </div>
                                <span className="font-bold tracking-tight dark:text-white text-slate-950">OpenPath</span>
                            </div>

                            <div className="text-center md:text-right">
                                <p className="text-xs dark:text-gray-500 text-gray-500 leading-relaxed">
                                    © 2026 OpenPath. Esta plataforma es un catálogo curado independiente de recursos públicos libres. <br/>
                                    No estamos afiliados a Harvard, Helsinki, Cisco u otras marcas aquí mencionadas de forma oficial.
                                </p>
                            </div>

                        </div>
                    </footer>

                </div>
            );
        };

        // Mount the React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
